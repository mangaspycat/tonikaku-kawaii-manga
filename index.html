<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub File Upload</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        textarea { width: 100%; max-width: 400px; padding: 10px; margin-bottom: 10px; }
        button { padding: 10px 20px; background-color: #2ea44f; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #22863a; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>গিটহাবে ফাইল সেভ করুন</h2>
    <p>নিচের বক্সে কিছু লিখুন এবং বাটনে ক্লিক করে গিটহাবে সেভ করুন:</p>
    
    <textarea id="fileContent" rows="5" placeholder="এখানে আপনার ফাইলের বিষয়বস্তু লিখুন..."></textarea><br>
    <button onclick="uploadToGitHub()">ফাইল সেভ করুন</button>
    
    <p id="status"></p>

    <script>
        async function uploadToGitHub() {
            const statusText = document.getElementById('status');
            statusText.innerText = "⏳ আপলোড হচ্ছে...";
            statusText.style.color = "blue";

            // ⚠️ আপনার গিটহাবের তথ্য এখানে দিন
            const token = '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'; // আপনার টোকেন
            const owner = 'mangaspycat'; // গিটহাব ইউজারনেম
            const repo = 'tonikaku-kawaii-manga'; // রিপোজিটরির নাম
            const path = 'my-new-file.txt'; // যে নামে ফাইল সেভ করতে চান

            const content = document.getElementById('fileContent').value;
            
            // গিটহাব API Base64 ফরম্যাটে ডেটা নেয়, তাই টেক্সটকে এনকোড করতে হবে
            const base64Content = btoa(unescape(encodeURIComponent(content)));

            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

            try {
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: 'API এর মাধ্যমে নতুন ফাইল যোগ করা হলো', // কমিট মেসেজ
                        content: base64Content
                    })
                });

                if (response.ok) {
                    statusText.innerText = "✅ ফাইল সফলভাবে গিটহাবে স্টোর হয়েছে!";
                    statusText.style.color = "green";
                } else {
                    const errorData = await response.json();
                    statusText.innerText = "❌ এরর: " + errorData.message;
                    statusText.style.color = "red";
                }
            } catch (error) {
                statusText.innerText = "❌ নেটওয়ার্ক বা অন্য কোনো সমস্যা হয়েছে!";
                statusText.style.color = "red";
            }
        }
    </script>

</body>
</html>
