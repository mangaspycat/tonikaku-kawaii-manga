<!DOCTYPE html>
<html>
<head>
    <title>GitHub File Uploader</title>
</head>
<body>

    <h2>Upload Files to GitHub</h2>

    <input type="file" id="files" multiple>
    <button onclick="uploadFiles()">Upload</button>

    <p id="status"></p>

<script>
const GITHUB_TOKEN = "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";
const OWNER = "mangaspycat";
const REPO = "tonikaku-kawaii-manga";
const BRANCH = "main";

async function uploadFiles() {
    const files = document.getElementById('files').files;

    for (const file of files) {
        const content = await fileToBase64(file);

        const response = await fetch(
            `https://api.github.com/repos/${OWNER}/${REPO}/contents/uploads/${file.name}`,
            {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Upload ${file.name}`,
                    content: content,
                    branch: BRANCH
                })
            }
        );

        if (response.ok) {
            document.getElementById('status').innerHTML += `<br>${file.name} uploaded successfully`;
        } else {
            document.getElementById('status').innerHTML += `<br>Failed to upload ${file.name}`;
        }
    }
}

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => {
            resolve(reader.result.split(',')[1]);
        };

        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}
</script>

</body>
</html>
