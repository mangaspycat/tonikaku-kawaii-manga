<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manga Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79b8ff;
            --danger: #f85149;
            --success: #3fb950;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ===== LOADING SCREEN ===== */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #loading-screen p {
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .progress-bar {
            width: 200px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.3s;
        }

        /* ===== CHAPTER SELECTOR ===== */
        #chapter-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 900;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s;
        }

        #chapter-overlay.hidden {
            transform: translateY(100%);
        }

        .overlay-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
        }

        .overlay-header h2 {
            font-size: 18px;
            color: var(--text-primary);
        }

        .close-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:active { background: var(--border); }

        .chapter-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chapter-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            margin-bottom: 6px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chapter-item:hover { border-color: var(--accent); }
        .chapter-item:active { transform: scale(0.98); }
        .chapter-item.active {
            border-color: var(--accent);
            background: rgba(88, 166, 255, 0.1);
        }

        .chapter-number {
            width: 40px;
            height: 40px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: var(--accent);
            margin-right: 14px;
            flex-shrink: 0;
        }

        .chapter-item.active .chapter-number {
            background: var(--accent);
            color: #fff;
        }

        .chapter-info {
            flex: 1;
            min-width: 0;
        }

        .chapter-title-text {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chapter-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .chapter-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            background: var(--bg-tertiary);
            color: var(--text-muted);
            margin-left: 8px;
        }

        .chapter-status.current {
            background: var(--accent);
            color: #fff;
        }

        /* ===== READER ===== */
        #reader {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 52px;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            transform: translateY(0);
            transition: transform 0.3s;
        }

        #top-bar.hidden { transform: translateY(-100%); }

        .top-left, .top-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:active { background: var(--border); transform: scale(0.95); }

        #manga-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        #page-badge {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            padding: 4px 10px;
            border-radius: 12px;
            font-variant-numeric: tabular-nums;
        }

        #canvas-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 60px 0 70px 0;
            -webkit-overflow-scrolling: touch;
        }

        #manga-canvas {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.6);
        }

        .touch-zone {
            position: fixed;
            top: 52px;
            bottom: 64px;
            z-index: 50;
        }

        #touch-left { left: 0; width: 28%; }
        #touch-right { right: 0; width: 28%; }
        #touch-center { left: 28%; right: 28%; width: auto; }

        #bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            z-index: 100;
            border-top: 1px solid var(--border);
            transform: translateY(0);
            transition: transform 0.3s;
        }

        #bottom-bar.hidden { transform: translateY(100%); }

        .nav-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .nav-btn:active { background: var(--border); transform: scale(0.95); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .nav-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }

        #slider-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 12px;
        }

        #page-slider {
            width: 100%;
            max-width: 280px;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }

        #page-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid var(--bg-primary);
            box-shadow: 0 0 0 1px var(--border);
        }

        #page-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid var(--bg-primary);
            box-shadow: 0 0 0 1px var(--border);
        }

        /* ===== SETTINGS ===== */
        #settings-panel {
            position: fixed;
            top: 52px;
            right: -320px;
            width: 300px;
            height: calc(100vh - 52px);
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            z-index: 200;
            transition: right 0.3s ease;
            padding: 20px;
            overflow-y: auto;
        }

        #settings-panel.open { right: 0; }

        .setting-group {
            margin-bottom: 24px;
        }

        .setting-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .option-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .option-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover { border-color: var(--accent); }
        .option-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .shortcut-list {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 2;
        }

        .shortcut-list kbd {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
        }

        /* ===== TOAST ===== */
        #toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 500;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ===== ERROR ===== */
        .error-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .error-screen h3 {
            color: var(--danger);
            margin-bottom: 10px;
        }

        .error-screen p {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .retry-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
<base target="_blank">
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <p id="loading-text">Scanning repository...</p>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div id="chapter-overlay" class="hidden">
        <div class="overlay-header">
            <h2>Chapters</h2>
            <button class="close-btn" onclick="closeChapterList()">✕</button>
        </div>
        <div class="chapter-list" id="chapter-list"></div>
    </div>

    <div id="reader">
        <div id="top-bar">
            <div class="top-left">
                <button class="icon-btn" onclick="openChapterList()" title="Chapters">📚</button>
                <span id="manga-title">Loading...</span>
            </div>
            <div class="top-right">
                <span id="page-badge">-- / --</span>
                <button class="icon-btn" onclick="toggleSettings()" title="Settings">⚙️</button>
            </div>
        </div>

        <div id="canvas-wrapper">
            <canvas id="manga-canvas"></canvas>
        </div>

        <div class="touch-zone" id="touch-left"></div>
        <div class="touch-zone" id="touch-center"></div>
        <div class="touch-zone" id="touch-right"></div>

        <div id="bottom-bar">
            <button class="nav-btn" id="prev-btn" onclick="goToPrev()">
                <span>◀</span> Prev
            </button>
            <div id="slider-container">
                <input type="range" id="page-slider" min="1" max="1" value="1" oninput="onSliderChange(this.value)">
            </div>
            <button class="nav-btn" id="next-btn" onclick="goToNext()">
                Next <span>▶</span>
            </button>
        </div>
    </div>

    <div id="settings-panel">
        <div class="setting-group">
            <div class="setting-label">Zoom</div>
            <div class="option-row">
                <button class="option-btn active" data-opt="zoom" data-val="fit">Fit</button>
                <button class="option-btn" data-opt="zoom" data-val="width">Width</button>
                <button class="option-btn" data-opt="zoom" data-val="1.5">1.5x</button>
                <button class="option-btn" data-opt="zoom" data-val="2">2x</button>
            </div>
        </div>
        <div class="setting-group">
            <div class="setting-label">Reading Direction</div>
            <div class="option-row">
                <button class="option-btn active" data-opt="dir" data-val="ltr">Left → Right</button>
                <button class="option-btn" data-opt="dir" data-val="rtl">Right → Left</button>
            </div>
        </div>
        <div class="setting-group">
            <div class="setting-label">Theme</div>
            <div class="option-row">
                <button class="option-btn active" data-opt="theme" data-val="dark">Dark</button>
                <button class="option-btn" data-opt="theme" data-val="light">Light</button>
            </div>
        </div>
        <div class="setting-group">
            <div class="setting-label">Keyboard Shortcuts</div>
            <div class="shortcut-list">
                <kbd>←</kbd> / <kbd>A</kbd> — Previous page<br>
                <kbd>→</kbd> / <kbd>D</kbd> — Next page<br>
                <kbd>↑</kbd> / <kbd>W</kbd> — Zoom in<br>
                <kbd>↓</kbd> / <kbd>S</kbd> — Zoom out<br>
                <kbd>F</kbd> — Fullscreen<br>
                <kbd>H</kbd> — Toggle UI<br>
                <kbd>C</kbd> — Chapter list
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // ============================================
        // AUTO-DETECT CONFIGURATION
        // ============================================
        // This auto-detects the repo owner/name from the current URL
        // when hosted on GitHub Pages. No manual config needed!
        // ============================================

        function detectRepoConfig() {
            const host = window.location.hostname;
            const path = window.location.pathname;

            // GitHub Pages: username.github.io/repo-name
            if (host.endsWith('.github.io')) {
                const owner = host.replace('.github.io', '');
                const parts = path.split('/').filter(p => p);
                const repo = parts[0] || '';
                const subdir = parts.slice(1).join('/') || '';
                return { owner, repo, subdir };
            }

            // Fallback for local testing or custom domain
            // You can override by setting these values:
            return {
                owner: '',  // e.g. 'mangaspycat'
                repo: '',   // e.g. 'tonikaku-kawaii-manga'
                subdir: ''  // e.g. 'chapters' if PDFs are in a subfolder
            };
        }

        const REPO_CONFIG = detectRepoConfig();

        // ============================================
        // STATE
        // ============================================
        let pdfDoc = null;
        let chapters = [];
        let currentChapterIndex = 0;
        let currentPage = 1;
        let totalPages = 0;
        let scale = 1;
        let zoomMode = "fit";
        let readingDir = "ltr";
        let uiVisible = true;
        let isLoading = false;
        let touchStartX = 0;
        let touchStartY = 0;
        let touchStartTime = 0;
        const pageCache = new Map();

        // ============================================
        // DOM
        // ============================================
        const canvas = document.getElementById("manga-canvas");
        const ctx = canvas.getContext("2d");
        const loadingScreen = document.getElementById("loading-screen");
        const loadingText = document.getElementById("loading-text");
        const progressFill = document.getElementById("progress-fill");
        const mangaTitle = document.getElementById("manga-title");
        const pageBadge = document.getElementById("page-badge");
        const pageSlider = document.getElementById("page-slider");
        const prevBtn = document.getElementById("prev-btn");
        const nextBtn = document.getElementById("next-btn");
        const topBar = document.getElementById("top-bar");
        const bottomBar = document.getElementById("bottom-bar");
        const settingsPanel = document.getElementById("settings-panel");
        const chapterOverlay = document.getElementById("chapter-overlay");
        const chapterListEl = document.getElementById("chapter-list");
        const toast = document.getElementById("toast");

        // ============================================
        // INIT
        // ============================================
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

        async function init() {
            // Step 1: Detect repo or use fallback
            if (!REPO_CONFIG.owner || !REPO_CONFIG.repo) {
                loadingText.textContent = "Detecting repository...";
                // Try to infer from referrer or URL params
                const urlParams = new URLSearchParams(window.location.search);
                REPO_CONFIG.owner = urlParams.get('owner') || REPO_CONFIG.owner;
                REPO_CONFIG.repo = urlParams.get('repo') || REPO_CONFIG.repo;

                if (!REPO_CONFIG.owner || !REPO_CONFIG.repo) {
                    showConfigError();
                    return;
                }
            }

            mangaTitle.textContent = REPO_CONFIG.repo;

            // Step 2: Fetch chapter list from GitHub API
            loadingText.textContent = "Finding chapters...";
            try {
                chapters = await fetchChapters();
                if (chapters.length === 0) {
                    showNoChaptersError();
                    return;
                }
                renderChapterList();
                loadChapter(0);
            } catch (err) {
                console.error("Init error:", err);
                showError("Failed to load chapters: " + err.message);
            }
        }

        // ============================================
        // AUTO-DETECT CHAPTERS FROM GITHUB API
        // ============================================
        async function fetchChapters() {
            const { owner, repo, subdir } = REPO_CONFIG;
            const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${subdir}`;

            const response = await fetch(apiUrl, {
                headers: {
                    'Accept': 'application/vnd.github+json',
                    'X-GitHub-Api-Version': '2022-11-28'
                }
            });

            if (!response.ok) {
                throw new Error(`GitHub API error: ${response.status}`);
            }

            const data = await response.json();

            // Filter PDF files and sort by name
            const pdfs = data
                .filter(item => item.type === 'file' && item.name.toLowerCase().endsWith('.pdf'))
                .sort((a, b) => naturalSort(a.name, b.name));

            // Map to chapter objects
            return pdfs.map((item, index) => ({
                id: index + 1,
                title: extractChapterName(item.name),
                file: item.download_url,  // GitHub provides direct raw URL
                size: formatFileSize(item.size),
                rawName: item.name
            }));
        }

        // Natural sort for chapter names (handles "Chapter 1", "Chapter 2", "Chapter 10" correctly)
        function naturalSort(a, b) {
            const regex = /(\d+)/g;
            const aParts = a.split(regex);
            const bParts = b.split(regex);

            for (let i = 0; i < Math.min(aParts.length, bParts.length); i++) {
                const aNum = parseInt(aParts[i]);
                const bNum = parseInt(bParts[i]);

                if (!isNaN(aNum) && !isNaN(bNum)) {
                    if (aNum !== bNum) return aNum - bNum;
                } else {
                    const cmp = aParts[i].localeCompare(bParts[i]);
                    if (cmp !== 0) return cmp;
                }
            }
            return a.length - b.length;
        }

        // Extract readable chapter name from filename
        function extractChapterName(filename) {
            // Remove .pdf extension
            let name = filename.replace(/\.pdf$/i, '');

            // Try to extract chapter number
            const chapterMatch = name.match(/chapter\s*(\d+)/i);
            if (chapterMatch) {
                return `Chapter ${chapterMatch[1]}`;
            }

            // Try to extract any number
            const numMatch = name.match(/(\d+)/);
            if (numMatch) {
                return `Chapter ${numMatch[1]}`;
            }

            // Fallback: clean up filename
            return name.replace(/[_@-]/g, ' ').trim() || filename;
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // ============================================
        // CHAPTER UI
        // ============================================
        function renderChapterList() {
            chapterListEl.innerHTML = "";
            chapters.forEach((ch, idx) => {
                const item = document.createElement("div");
                item.className = "chapter-item" + (idx === currentChapterIndex ? " active" : "");
                item.onclick = () => selectChapter(idx);

                item.innerHTML = `
                    <div class="chapter-number">${ch.id}</div>
                    <div class="chapter-info">
                        <div class="chapter-title-text">${ch.title}</div>
                        <div class="chapter-meta">${ch.size} — ${ch.rawName}</div>
                    </div>
                    ${idx === currentChapterIndex ? '<span class="chapter-status current">READING</span>' : ''}
                `;
                chapterListEl.appendChild(item);
            });
        }

        function openChapterList() {
            renderChapterList();
            chapterOverlay.classList.remove("hidden");
        }

        function closeChapterList() {
            chapterOverlay.classList.add("hidden");
        }

        function selectChapter(index) {
            if (index === currentChapterIndex) {
                closeChapterList();
                return;
            }
            closeChapterList();
            loadChapter(index);
        }

        // ============================================
        // LOAD CHAPTER
        // ============================================
        async function loadChapter(index) {
            if (isLoading) return;
            isLoading = true;

            currentChapterIndex = index;
            const chapter = chapters[index];

            loadingScreen.style.display = "flex";
            loadingScreen.style.opacity = "1";
            loadingText.textContent = `Loading ${chapter.title}...`;
            progressFill.style.width = "0%";

            pageCache.clear();

            try {
                const loadingTask = pdfjsLib.getDocument({
                    url: chapter.file,
                    withCredentials: false
                });

                loadingTask.onProgress = (progress) => {
                    if (progress.total > 0) {
                        const pct = (progress.loaded / progress.total) * 100;
                        progressFill.style.width = pct + "%";
                    }
                };

                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;
                currentPage = 1;

                pageSlider.max = totalPages;
                pageSlider.value = 1;
                updateUI();

                loadingScreen.style.opacity = "0";
                setTimeout(() => {
                    loadingScreen.style.display = "none";
                }, 500);

                await renderPage(1);
                preloadNearbyPages();
                showToast(`Loaded ${chapter.title}`);

            } catch (error) {
                console.error("Chapter load error:", error);
                loadingScreen.innerHTML = `
                    <div class="error-screen">
                        <h3>Failed to load chapter</h3>
                        <p>${error.message}</p>
                        <p style="font-size:12px;margin-top:8px;">File: ${chapter.rawName}</p>
                        <button class="retry-btn" onclick="location.reload()">Retry</button>
                    </div>
                `;
            } finally {
                isLoading = false;
            }
        }

        // ============================================
        // RENDER PAGE
        // ============================================
        async function renderPage(pageNum) {
            if (!pdfDoc || pageNum < 1 || pageNum > totalPages) return;

            currentPage = pageNum;
            updateUI();

            try {
                const page = await pdfDoc.getPage(pageNum);
                const wrapper = document.getElementById("canvas-wrapper");
                const containerW = wrapper.clientWidth - 20;
                const containerH = wrapper.clientHeight - 20;
                const viewport = page.getViewport({ scale: 1 });

                if (zoomMode === "fit") {
                    scale = Math.min(containerW / viewport.width, containerH / viewport.height);
                } else if (zoomMode === "width") {
                    scale = containerW / viewport.width;
                } else {
                    scale = parseFloat(zoomMode);
                }

                const scaled = page.getViewport({ scale: scale });
                const dpr = window.devicePixelRatio || 1;

                canvas.style.width = scaled.width + "px";
                canvas.style.height = scaled.height + "px";
                canvas.width = scaled.width * dpr;
                canvas.height = scaled.height * dpr;

                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

                await page.render({
                    canvasContext: ctx,
                    viewport: scaled
                }).promise;

            } catch (err) {
                console.error("Render error:", err);
            }
        }

        async function preloadNearbyPages() {
            const pagesToLoad = [currentPage + 1, currentPage + 2];
            for (const p of pagesToLoad) {
                if (p <= totalPages && !pageCache.has(p)) {
                    try {
                        const page = await pdfDoc.getPage(p);
                        pageCache.set(p, true);
                    } catch (e) {}
                }
            }
        }

        // ============================================
        // NAVIGATION
        // ============================================
        function goToPrev() {
            if (readingDir === "rtl") {
                if (currentPage < totalPages) {
                    renderPage(currentPage + 1);
                    preloadNearbyPages();
                } else {
                    goToPrevChapter();
                }
            } else {
                if (currentPage > 1) {
                    renderPage(currentPage - 1);
                } else {
                    goToPrevChapter();
                }
            }
        }

        function goToNext() {
            if (readingDir === "rtl") {
                if (currentPage > 1) {
                    renderPage(currentPage - 1);
                } else {
                    goToNextChapter();
                }
            } else {
                if (currentPage < totalPages) {
                    renderPage(currentPage + 1);
                    preloadNearbyPages();
                } else {
                    goToNextChapter();
                }
            }
        }

        function goToPrevChapter() {
            if (currentChapterIndex > 0) {
                loadChapter(currentChapterIndex - 1);
            } else {
                showToast("This is the first chapter");
            }
        }

        function goToNextChapter() {
            if (currentChapterIndex < chapters.length - 1) {
                loadChapter(currentChapterIndex + 1);
            } else {
                showToast("This is the last chapter");
            }
        }

        function onSliderChange(val) {
            const page = parseInt(val);
            if (page >= 1 && page <= totalPages) {
                renderPage(page);
            }
        }

        // ============================================
        // UI UPDATES
        // ============================================
        function updateUI() {
            pageBadge.textContent = `${currentPage} / ${totalPages}`;
            pageSlider.value = currentPage;

            const atFirst = currentChapterIndex === 0 && currentPage === 1;
            const atLast = currentChapterIndex === chapters.length - 1 && currentPage === totalPages;

            prevBtn.disabled = readingDir === "ltr" ? atFirst : atLast;
            nextBtn.disabled = readingDir === "ltr" ? atLast : atFirst;
        }

        function toggleUI() {
            uiVisible = !uiVisible;
            topBar.classList.toggle("hidden", !uiVisible);
            bottomBar.classList.toggle("hidden", !uiVisible);
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2500);
        }

        // ============================================
        // SETTINGS
        // ============================================
        function toggleSettings() {
            settingsPanel.classList.toggle("open");
        }

        document.addEventListener("click", (e) => {
            if (!settingsPanel.contains(e.target) && !e.target.closest('[onclick="toggleSettings()"]')) {
                settingsPanel.classList.remove("open");
            }
        });

        document.querySelectorAll(".option-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const opt = btn.dataset.opt;
                const val = btn.dataset.val;
                document.querySelectorAll(`[data-opt="${opt}"]`).forEach(b => b.classList.remove("active"));
                btn.classList.add("active");

                if (opt === "zoom") {
                    zoomMode = val;
                    renderPage(currentPage);
                } else if (opt === "dir") {
                    readingDir = val;
                    updateUI();
                } else if (opt === "theme") {
                    if (val === "light") {
                        document.documentElement.style.setProperty("--bg-primary", "#ffffff");
                        document.documentElement.style.setProperty("--bg-secondary", "#f6f8fa");
                        document.documentElement.style.setProperty("--bg-tertiary", "#eaeef2");
                        document.documentElement.style.setProperty("--border", "#d0d7de");
                        document.documentElement.style.setProperty("--text-primary", "#1f2328");
                        document.documentElement.style.setProperty("--text-secondary", "#24292f");
                        document.documentElement.style.setProperty("--text-muted", "#656d76");
                    } else {
                        document.documentElement.style.setProperty("--bg-primary", "#0d1117");
                        document.documentElement.style.setProperty("--bg-secondary", "#161b22");
                        document.documentElement.style.setProperty("--bg-tertiary", "#21262d");
                        document.documentElement.style.setProperty("--border", "#30363d");
                        document.documentElement.style.setProperty("--text-primary", "#f0f6fc");
                        document.documentElement.style.setProperty("--text-secondary", "#c9d1d9");
                        document.documentElement.style.setProperty("--text-muted", "#8b949e");
                    }
                }
            });
        });

        // ============================================
        // TOUCH & SWIPE
        // ============================================
        document.getElementById("touch-left").addEventListener("click", () => {
            readingDir === "rtl" ? goToNext() : goToPrev();
        });

        document.getElementById("touch-right").addEventListener("click", () => {
            readingDir === "rtl" ? goToPrev() : goToNext();
        });

        document.getElementById("touch-center").addEventListener("click", toggleUI);

        document.addEventListener("touchstart", (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchStartTime = Date.now();
        }, { passive: true });

        document.addEventListener("touchend", (e) => {
            const dx = touchStartX - e.changedTouches[0].clientX;
            const dy = touchStartY - e.changedTouches[0].clientY;
            const dt = Date.now() - touchStartTime;

            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50 && dt < 500) {
                if (dx > 0) {
                    readingDir === "rtl" ? goToPrev() : goToNext();
                } else {
                    readingDir === "rtl" ? goToNext() : goToPrev();
                }
            }
        }, { passive: true });

        // ============================================
        // KEYBOARD
        // ============================================
        document.addEventListener("keydown", (e) => {
            if (e.target.tagName === "INPUT") return;

            switch(e.key) {
                case "ArrowLeft":
                case "a": case "A":
                    e.preventDefault();
                    readingDir === "rtl" ? goToNext() : goToPrev();
                    break;
                case "ArrowRight":
                case "d": case "D":
                    e.preventDefault();
                    readingDir === "rtl" ? goToPrev() : goToNext();
                    break;
                case "ArrowUp":
                case "w": case "W":
                    e.preventDefault();
                    zoomMode = zoomMode === "fit" ? "width" : zoomMode === "width" ? "1.5" : "2";
                    renderPage(currentPage);
                    break;
                case "ArrowDown":
                case "s": case "S":
                    e.preventDefault();
                    zoomMode = zoomMode === "2" ? "1.5" : zoomMode === "1.5" ? "width" : "fit";
                    renderPage(currentPage);
                    break;
                case "f": case "F":
                    e.preventDefault();
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen();
                    } else {
                        document.exitFullscreen();
                    }
                    break;
                case "h": case "H":
                    e.preventDefault();
                    toggleUI();
                    break;
                case "c": case "C":
                    e.preventDefault();
                    openChapterList();
                    break;
                case "Escape":
                    closeChapterList();
                    settingsPanel.classList.remove("open");
                    break;
            }
        });

        // ============================================
        // RESIZE
        // ============================================
        let resizeTimer;
        window.addEventListener("resize", () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (pdfDoc) renderPage(currentPage);
            }, 200);
        });

        // ============================================
        // ERROR HANDLERS
        // ============================================
        function showConfigError() {
            loadingScreen.innerHTML = `
                <div class="error-screen">
                    <h3>Repository Not Detected</h3>
                    <p>Could not auto-detect your GitHub repository.</p>
                    <p style="font-size:12px;margin-top:8px;">
                        Please ensure this is hosted on GitHub Pages,<br>
                        or add ?owner=YOURNAME&repo=YOURREPO to the URL.
                    </p>
                </div>
            `;
        }

        function showNoChaptersError() {
            loadingScreen.innerHTML = `
                <div class="error-screen">
                    <h3>No PDFs Found</h3>
                    <p>No PDF files were found in this repository.</p>
                    <p style="font-size:12px;margin-top:8px;">
                        Upload PDF files to your repo and refresh.<br>
                        Repo: ${REPO_CONFIG.owner}/${REPO_CONFIG.repo}
                    </p>
                </div>
            `;
        }

        function showError(msg) {
            loadingScreen.innerHTML = `
                <div class="error-screen">
                    <h3>Error</h3>
                    <p>${msg}</p>
                    <button class="retry-btn" onclick="location.reload()">Retry</button>
                </div>
            `;
        }

        // ============================================
        // START
        // ============================================
        init();
    </script>
</body>
</html>
