<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manga Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0d1117;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading p {
            margin-top: 20px;
            font-size: 14px;
            color: #8b949e;
        }

        #progress-bar {
            width: 200px;
            height: 4px;
            background: #30363d;
            border-radius: 2px;
            margin-top: 15px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: #58a6ff;
            transition: width 0.3s;
        }

        #reader-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 100;
            border-bottom: 1px solid #30363d;
            transform: translateY(0);
            transition: transform 0.3s;
        }

        #top-bar.hidden {
            transform: translateY(-100%);
        }

        #chapter-title {
            font-size: 14px;
            font-weight: 600;
            color: #f0f6fc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60%;
        }

        #page-info {
            font-size: 13px;
            color: #8b949e;
            background: #21262d;
            padding: 4px 12px;
            border-radius: 12px;
        }

        #canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 60px 0 70px 0;
            -webkit-overflow-scrolling: touch;
        }

        #manga-canvas {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        #bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 100;
            border-top: 1px solid #30363d;
            transform: translateY(0);
            transition: transform 0.3s;
        }

        #bottom-bar.hidden {
            transform: translateY(100%);
        }

        .nav-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-btn:active {
            background: #30363d;
            transform: scale(0.95);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        #page-slider-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 15px;
        }

        #page-slider {
            width: 100%;
            max-width: 300px;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: #30363d;
            border-radius: 2px;
            outline: none;
        }

        #page-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #58a6ff;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #0d1117;
        }

        #page-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: #58a6ff;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #0d1117;
        }

        .touch-zone {
            position: fixed;
            top: 50px;
            bottom: 60px;
            width: 33%;
            z-index: 50;
        }

        #touch-left { left: 0; }
        #touch-right { right: 0; }
        #touch-center { 
            left: 33%; 
            right: 33%; 
            width: auto;
        }

        #settings-panel {
            position: fixed;
            top: 50px;
            right: -300px;
            width: 280px;
            height: calc(100vh - 50px);
            background: #161b22;
            border-left: 1px solid #30363d;
            z-index: 200;
            transition: right 0.3s;
            padding: 20px;
            overflow-y: auto;
        }

        #settings-panel.open {
            right: 0;
        }

        .setting-item {
            margin-bottom: 20px;
        }

        .setting-label {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .zoom-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 16px;
            border-radius: 6px;
            margin-right: 8px;
            cursor: pointer;
        }

        .zoom-btn.active {
            background: #58a6ff;
            color: #fff;
            border-color: #58a6ff;
        }

        #settings-btn {
            background: none;
            border: none;
            color: #8b949e;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
        }

        .swipe-hint {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(88, 166, 255, 0.9);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 150;
            animation: fadeOut 3s forwards;
            animation-delay: 2s;
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        .error-msg {
            text-align: center;
            padding: 20px;
            color: #f85149;
        }

        .error-msg button {
            margin-top: 15px;
            background: #f85149;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>মাঙ্গা লোড হচ্ছে...</p>
        <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <div id="reader-container">
        <div id="top-bar">
            <div id="chapter-title">Tonikawa - Chapter 1</div>
            <div style="display:flex;align-items:center;gap:10px;">
                <span id="page-info">1 / 1</span>
                <button id="settings-btn">⚙️</button>
            </div>
        </div>

        <div id="canvas-container">
            <canvas id="manga-canvas"></canvas>
        </div>

        <div class="touch-zone" id="touch-left"></div>
        <div class="touch-zone" id="touch-center"></div>
        <div class="touch-zone" id="touch-right"></div>

        <div id="bottom-bar">
            <button class="nav-btn" id="prev-btn">
                <span>◀</span> আগে
            </button>
            <div id="page-slider-container">
                <input type="range" id="page-slider" min="1" max="1" value="1">
            </div>
            <button class="nav-btn" id="next-btn">
                পরে <span>▶</span>
            </button>
        </div>

        <div class="swipe-hint">👆 বাম/ডান সোয়াইপ করুন</div>
    </div>

    <div id="settings-panel">
        <div class="setting-item">
            <div class="setting-label">জুম লেভেল</div>
            <div>
                <button class="zoom-btn active" data-zoom="fit">Fit</button>
                <button class="zoom-btn" data-zoom="width">Width</button>
                <button class="zoom-btn" data-zoom="1.5">1.5x</button>
                <button class="zoom-btn" data-zoom="2">2x</button>
            </div>
        </div>
        <div class="setting-item">
            <div class="setting-label">রিডিং ডিরেকশন</div>
            <div>
                <button class="zoom-btn active" data-dir="ltr">Left → Right</button>
                <button class="zoom-btn" data-dir="rtl">Right → Left</button>
            </div>
        </div>
        <div class="setting-item">
            <div class="setting-label">থিম</div>
            <div>
                <button class="zoom-btn active" data-theme="dark">Dark</button>
                <button class="zoom-btn" data-theme="light">Light</button>
            </div>
        </div>
        <div class="setting-item">
            <div class="setting-label">কীবোর্ড শর্টকাট</div>
            <div style="font-size:13px;color:#8b949e;line-height:1.8;">
                ← / A : আগের পেজ<br>
                → / D : পরের পেজ<br>
                ↑ / W : জুম ইন<br>
                ↓ / S : জুম আউট<br>
                F : ফুলস্ক্রিন<br>
                H : UI হাইড/শো
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION - এখানে আপনার PDF লিংক দিন
        // ============================================
        const CONFIG = {
            // GitHub Raw PDF URL (নিচের লিংকটি আপনার ফাইলের লিংক দিয়ে বদলান)
            pdfUrl: 'https://raw.githubusercontent.com/mangaspycat/tonikaku-kawaii-manga/main/Tonikawa%20-%20Chapter%201%20%40Manga_LightN.pdf',

            // অথবা আপনার রিলেটিভ পাথ যদি একই ফোল্ডারে থাকে:
            // pdfUrl: './Tonikawa - Chapter 1 @Manga_LightN.pdf',

            title: 'Tonikawa - Chapter 1',
            readingDirection: 'ltr', // 'ltr' বা 'rtl'
            defaultZoom: 'fit' // 'fit', 'width', '1.5', '2'
        };

        // PDF.js worker সেটআপ
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // State
        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let scale = 1;
        let zoomMode = CONFIG.defaultZoom;
        let readingDir = CONFIG.readingDirection;
        let uiVisible = true;
        let touchStartX = 0;
        let touchStartY = 0;

        // Elements
        const canvas = document.getElementById('manga-canvas');
        const ctx = canvas.getContext('2d');
        const loadingEl = document.getElementById('loading');
        const progressFill = document.getElementById('progress-fill');
        const pageInfo = document.getElementById('page-info');
        const pageSlider = document.getElementById('page-slider');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const topBar = document.getElementById('top-bar');
        const bottomBar = document.getElementById('bottom-bar');
        const settingsPanel = document.getElementById('settings-panel');
        const settingsBtn = document.getElementById('settings-btn');
        const chapterTitle = document.getElementById('chapter-title');

        chapterTitle.textContent = CONFIG.title;

        // Load PDF
        async function loadPDF() {
            try {
                const loadingTask = pdfjsLib.getDocument({
                    url: CONFIG.pdfUrl,
                    withCredentials: false
                });

                loadingTask.onProgress = function(progress) {
                    if (progress.total > 0) {
                        const percent = (progress.loaded / progress.total) * 100;
                        progressFill.style.width = percent + '%';
                    }
                };

                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;

                pageSlider.max = totalPages;
                pageInfo.textContent = `1 / ${totalPages}`;

                loadingEl.style.opacity = '0';
                setTimeout(() => loadingEl.style.display = 'none', 500);

                renderPage(1);
                preloadPages();

            } catch (error) {
                console.error('PDF load error:', error);
                loadingEl.innerHTML = `
                    <div class="error-msg">
                        <p>❌ PDF লোড করতে সমস্যা হচ্ছে</p>
                        <p style="font-size:12px;margin-top:10px;">${error.message}</p>
                        <button onclick="location.reload()">আবার চেষ্টা করুন</button>
                    </div>
                `;
            }
        }

        // Render page
        async function renderPage(pageNum) {
            if (pageNum < 1 || pageNum > totalPages) return;

            currentPage = pageNum;
            pageInfo.textContent = `${currentPage} / ${totalPages}`;
            pageSlider.value = currentPage;

            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;

            try {
                const page = await pdfDoc.getPage(pageNum);

                // Calculate scale
                const container = document.getElementById('canvas-container');
                const containerWidth = container.clientWidth - 20;
                const containerHeight = container.clientHeight - 20;

                const viewport = page.getViewport({ scale: 1 });

                if (zoomMode === 'fit') {
                    scale = Math.min(
                        containerWidth / viewport.width,
                        containerHeight / viewport.height
                    );
                } else if (zoomMode === 'width') {
                    scale = containerWidth / viewport.width;
                } else {
                    scale = parseFloat(zoomMode);
                }

                const scaledViewport = page.getViewport({ scale: scale });

                canvas.width = scaledViewport.width;
                canvas.height = scaledViewport.height;

                // High DPI support
                const dpr = window.devicePixelRatio || 1;
                canvas.style.width = scaledViewport.width + 'px';
                canvas.style.height = scaledViewport.height + 'px';
                canvas.width = scaledViewport.width * dpr;
                canvas.height = scaledViewport.height * dpr;
                ctx.scale(dpr, dpr);

                await page.render({
                    canvasContext: ctx,
                    viewport: scaledViewport
                }).promise;

            } catch (error) {
                console.error('Render error:', error);
            }
        }

        // Preload nearby pages
        async function preloadPages() {
            const pagesToLoad = [currentPage + 1, currentPage + 2];
            for (const p of pagesToLoad) {
                if (p <= totalPages) {
                    try {
                        const page = await pdfDoc.getPage(p);
                        // Just load into cache
                    } catch (e) {}
                }
            }
        }

        // Navigation
        function goToPrev() {
            if (readingDir === 'rtl') {
                if (currentPage < totalPages) renderPage(currentPage + 1);
            } else {
                if (currentPage > 1) renderPage(currentPage - 1);
            }
        }

        function goToNext() {
            if (readingDir === 'rtl') {
                if (currentPage > 1) renderPage(currentPage - 1);
            } else {
                if (currentPage < totalPages) renderPage(currentPage + 1);
            }
        }

        function goToPage(pageNum) {
            const num = parseInt(pageNum);
            if (num >= 1 && num <= totalPages) {
                renderPage(num);
            }
        }

        // Toggle UI
        function toggleUI() {
            uiVisible = !uiVisible;
            topBar.classList.toggle('hidden', !uiVisible);
            bottomBar.classList.toggle('hidden', !uiVisible);
        }

        // Event Listeners
        prevBtn.addEventListener('click', goToPrev);
        nextBtn.addEventListener('click', goToNext);

        pageSlider.addEventListener('input', (e) => {
            goToPage(e.target.value);
        });

        // Touch zones
        document.getElementById('touch-left').addEventListener('click', () => {
            if (readingDir === 'rtl') goToNext();
            else goToPrev();
        });

        document.getElementById('touch-right').addEventListener('click', () => {
            if (readingDir === 'rtl') goToPrev();
            else goToNext();
        });

        document.getElementById('touch-center').addEventListener('click', toggleUI);

        // Swipe support
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const diffX = touchStartX - touchEndX;
            const diffY = touchStartY - touchEndY;

            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                if (diffX > 0) {
                    // Swipe left
                    if (readingDir === 'rtl') goToPrev();
                    else goToNext();
                } else {
                    // Swipe right
                    if (readingDir === 'rtl') goToNext();
                    else goToPrev();
                }
            }
        }, { passive: true });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    goToPrev();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    goToNext();
                    break;
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    // Zoom in logic
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    // Zoom out logic
                    break;
                case 'f':
                case 'F':
                    e.preventDefault();
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen();
                    } else {
                        document.exitFullscreen();
                    }
                    break;
                case 'h':
                case 'H':
                    e.preventDefault();
                    toggleUI();
                    break;
            }
        });

        // Settings panel
        settingsBtn.addEventListener('click', () => {
            settingsPanel.classList.toggle('open');
        });

        document.addEventListener('click', (e) => {
            if (!settingsPanel.contains(e.target) && e.target !== settingsBtn) {
                settingsPanel.classList.remove('open');
            }
        });

        // Zoom buttons
        document.querySelectorAll('[data-zoom]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-zoom]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                zoomMode = btn.dataset.zoom;
                renderPage(currentPage);
            });
        });

        // Direction buttons
        document.querySelectorAll('[data-dir]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-dir]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                readingDir = btn.dataset.dir;
            });
        });

        // Theme buttons
        document.querySelectorAll('[data-theme]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-theme]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const theme = btn.dataset.theme;
                if (theme === 'light') {
                    document.body.style.background = '#ffffff';
                    document.body.style.color = '#1f2328';
                } else {
                    document.body.style.background = '#0d1117';
                    document.body.style.color = '#c9d1d9';
                }
            });
        });

        // Window resize
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                renderPage(currentPage);
            }, 200);
        });

        // Start
        loadPDF();
    </script>
</body>
    </html>
